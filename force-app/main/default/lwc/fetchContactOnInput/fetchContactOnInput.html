<template>
    <template if:true={loading} >
       <div class="loader">
        <img src="fetchContactOnInput.svg" alt="">
         <p >Please Wait Data Is Loading.......</p>
       </div>
    </template>

    <template if:false={loading} > 
        <lightning-input 
        class="query"
      type="text"
      label="Enter Email Or Name"
    ></lightning-input>

    <button 
    class="search"
      onclick={getData} 
    >Search</button>
    </template>

    <template if:true={allCons}>
      <lightning-datatable
        key-field="Id"
        data={allCons}
        columns={cols}
      ></lightning-datatable>
    </template>
    
</template>
