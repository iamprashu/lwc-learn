<template>
    <lightning-card title="Opportunities">

        <template if:true={loading}>
            <div class="loading">
                Please Wait...
            </div>
        </template>

        <template if:true={data}>
            <lightning-datatable
                key-field="Id"
                data={data}
                columns={columns}
                hide-checkbox-column>
            </lightning-datatable>
        </template>

         <template if:true={noOpps}>
            <div class="empty">
                No Opportunities Found
            </div>
        </template>

    </lightning-card>
</template>
