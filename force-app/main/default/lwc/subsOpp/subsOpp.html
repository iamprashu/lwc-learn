<template>
    <lightning-card title="Opportunities">
         <template if:true={loading}>
            <p style="background-color: red; font-size:large">Loading.................</p>
        </template>
        <template if:true={opportunities}>
            <template for:each={opportunities} for:item="opp">
                <p key={opp.Id}>
                    {opp.Name} - {opp.StageName} - ₹{opp.Amount}
                </p>
            </template>
        </template>
    </lightning-card>
</template>
