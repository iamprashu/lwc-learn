<template>
    <lightning-card title="Products">

        <template if:true={products}>
            <ul>
                <template for:each={products} for:item="product">
                    <li key={product.id}
                        data-id={product.id}
                        onclick={handleClick}
                        style="cursor:pointer; padding:10px; border-bottom:1px solid #ddd;">
                        <template if:true={product.images}>
                            <template for:each={product.images} for:item="img">
                                <img src={img} key={img} width="100px" height="100px"/>
                            </template>
                        </template>

                        <strong>{product.title}</strong><br/>
                        ₹{product.price}
                    </li>
                </template>
            </ul>
        </template>

       <template if:true={showModal}>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium">{selected.title}</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium">

                <template if:true={selected.images}>
                    <div class="image-container">
                        <template for:each={selected.images} for:item="img">
                            <img src={img} key={img} />
                        </template>
                    </div>
                </template>

                <p><b>Price:</b> ₹{selected.price}</p>
                <p><b>Description:</b> {selected.description}</p>
            </div>

            <footer class="slds-modal__footer">
                <lightning-button label="Close" onclick={closeModal}></lightning-button>
            </footer>

        </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>
</template>

    </lightning-card>
</template>
